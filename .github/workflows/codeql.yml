name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            os: ubuntu-latest
            build-mode: autobuild
          - language: javascript-typescript
            os: ubuntu-latest
            build-mode: none
          - language: kotlin
            os: ubuntu-latest
            build-mode: none  # build-mode:manual fails with Kotlin 2.3.20+ (CodeQL limitation)

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Go: set up Go + bun so autobuild can compile the server
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - uses: oven-sh/setup-bun@v2
        if: matrix.language == 'go'
        with:
          bun-version: latest

      - name: Build frontend stub (Go analysis)
        if: matrix.language == 'go'
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run build:embed

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
