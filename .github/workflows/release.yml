name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LIVEKIT_VERSION: "1.10.1"

jobs:
  # ── Server binaries (multi-platform) ─────────────────────────
  server-binary:
    name: Server – ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
            cgo: "1"
            cc: gcc
            lk_arch: amd64
          - goos: linux
            goarch: arm64
            suffix: linux_arm64
            cgo: "1"
            cc: aarch64-linux-gnu-gcc
            lk_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        if: matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: server/go.sum

      - name: Build and embed frontend
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run build:embed

      - name: Download LiveKit binary
        env:
          LK_ARCH: ${{ matrix.lk_arch }}
        run: |
          mkdir -p server/internal/livekit/bin
          LK_FILENAME="livekit_${LIVEKIT_VERSION}_linux_${LK_ARCH}.tar.gz"
          curl -fsSL "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${LK_FILENAME}" -o "/tmp/${LK_FILENAME}"
          tar -xzf "/tmp/${LK_FILENAME}" -C server/internal/livekit/bin/ livekit-server
          chmod +x server/internal/livekit/bin/livekit-server

      - name: Build server binary
        working-directory: server
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -ldflags="-s -w" -o ../dist/bedrud ./cmd/bedrud/main.go

      - name: Package binary
        run: |
          cd dist
          cp bedrud bedrud_${{ matrix.suffix }}
          tar -cJf bedrud_${{ matrix.suffix }}.tar.xz bedrud
          rm bedrud

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: |
            dist/bedrud_${{ matrix.suffix }}.tar.xz
            dist/bedrud_${{ matrix.suffix }}

  # ── Docker image ──────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Android APK ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PROPERTIES: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "$KEYSTORE_PROPERTIES" > keystore.properties
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: |
          if [ -f keystore.properties ]; then
            ./gradlew assembleRelease
          else
            echo "⚠ Skipping release build — no signing key configured"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/android/keystore.properties') != '' }}
        with:
          name: android-release-apk
          path: apps/android/app/build/outputs/apk/release/app-release.apk

  # ── iOS IPA ──────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-15
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "⚠ No iOS signing certificate configured — building unsigned archive"
            exit 0
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          if [ -n "$PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          fi

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: apps/ios/.spm-cache
          key: ios-spm-${{ hashFiles('apps/ios/Bedrud.xcodeproj/project.pbxproj') }}
          restore-keys: ios-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Run tests
        run: |
          xcodebuild test \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -configuration Release \
            -archivePath build/Bedrud.xcarchive \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

      - name: Export IPA
        env:
          HAS_CERT: ${{ secrets.IOS_P12_BASE64 != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Bedrud.xcarchive \
              -exportPath build/export \
              -exportOptionsPlist ExportOptions.plist \
              -allowProvisioningUpdates
          else
            echo "⚠ Skipping IPA export — no signing certificate configured"
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/ios/build/export/Bedrud.ipa') != '' }}
        with:
          name: ios-ipa
          path: apps/ios/build/export/Bedrud.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # ── Desktop Windows ───────────────────────────────────────────
  desktop-windows:
    name: Desktop – Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p bedrud-desktop --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\bedrud-desktop.exe dist\
          Compress-Archive -Path dist\* -DestinationPath bedrud-desktop-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: bedrud-desktop-windows-x86_64
          path: bedrud-desktop-windows-x86_64.zip

  # ── Desktop Linux ─────────────────────────────────────────────
  desktop-linux:
    name: Desktop – Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Slint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libsecret-1-dev \
            libasound2-dev
      - name: Build release binary
        run: cargo build -p bedrud-desktop --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bedrud-desktop dist/
          tar -cJf bedrud-desktop-linux-x86_64.tar.xz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: bedrud-desktop-linux-x86_64
          path: bedrud-desktop-linux-x86_64.tar.xz

  # ── GitHub Release ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [server-binary, docker, android, desktop-windows, desktop-linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{server-*,android-*,web-*,ios-*,bedrud-desktop-*}"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/server-* -name "*.tar.xz" -exec cp {} release-assets/ \;
          find artifacts/server-* -not -name "*.tar.xz" -not -name "." -type f -exec cp {} release-assets/ \;
          [ -f artifacts/android-debug-apk/app-debug.apk ] && \
            cp artifacts/android-debug-apk/app-debug.apk release-assets/bedrud-debug.apk
          [ -f artifacts/android-release-apk/app-release.apk ] && \
            cp artifacts/android-release-apk/app-release.apk release-assets/bedrud-release.apk
          [ -f artifacts/ios-ipa/Bedrud.ipa ] && \
            cp artifacts/ios-ipa/Bedrud.ipa release-assets/Bedrud.ipa
          find artifacts/bedrud-desktop-* -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  # ── Telegram notification ─────────────────────────────────────
  telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{server-*,android-*,ios-*}"

      - name: Collect assets
        run: |
          mkdir -p tg-assets
          find artifacts/server-* -name "*.tar.xz" -exec cp {} tg-assets/ \; 2>/dev/null || true
          [ -f artifacts/android-debug-apk/app-debug.apk ]     && cp artifacts/android-debug-apk/app-debug.apk     tg-assets/bedrud-debug.apk   || true
          [ -f artifacts/android-release-apk/app-release.apk ] && cp artifacts/android-release-apk/app-release.apk tg-assets/bedrud-release.apk || true
          [ -f artifacts/ios-ipa/Bedrud.ipa ]                   && cp artifacts/ios-ipa/Bedrud.ipa                  tg-assets/Bedrud.ipa          || true
          ls -lh tg-assets/

      - name: Send message and files to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          MSG=$(cat <<EOF
          🚀 <b>Bedrud ${TAG} released</b>

          <a href="${RELEASE_URL}">View release on GitHub</a>

          <b>Server binaries</b>
          • <a href="https://github.com/${REPO}/releases/download/${TAG}/bedrud_linux_amd64.tar.xz">Linux x86_64</a>
          • <a href="https://github.com/${REPO}/releases/download/${TAG}/bedrud_linux_arm64.tar.xz">Linux ARM64</a>

          <b>Android</b>
          • <a href="https://github.com/${REPO}/releases/download/${TAG}/bedrud-release.apk">Release APK</a>
          • <a href="https://github.com/${REPO}/releases/download/${TAG}/bedrud-debug.apk">Debug APK</a>
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"

          MAX=49000000
          upload() {
            local f="$1" caption="$2"
            local size
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            if [ "$size" -le "$MAX" ]; then
              echo "Uploading $(basename "$f") (${size} bytes)"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
                -F "chat_id=${CHAT_ID}" \
                -F "document=@${f}" \
                -F "caption=${caption}" || echo "⚠ upload failed for $(basename "$f")"
            else
              echo "⚠ $(basename "$f") is ${size} bytes — too large for direct upload, linked in message"
            fi
          }

          for f in tg-assets/*.apk tg-assets/*.ipa tg-assets/*.tar.xz; do
            [ -f "$f" ] && upload "$f" "Bedrud ${TAG} — $(basename "$f")"
          done
