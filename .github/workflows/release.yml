name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  LIVEKIT_VERSION: "1.10.1"

jobs:
  # ── Server binaries (multi-platform) ─────────────────────────
  server-binary:
    name: Server – ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
            cgo: "1"
            cc: gcc
            lk_arch: amd64
          - goos: linux
            goarch: arm64
            suffix: linux_arm64
            cgo: "1"
            cc: aarch64-linux-gnu-gcc
            lk_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        if: matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: server/go.sum

      - name: Build and embed frontend
        working-directory: apps/web
        run: |
          bun install --frozen-lockfile
          bun run build:embed

      - name: Download LiveKit binary
        env:
          LK_ARCH: ${{ matrix.lk_arch }}
        run: |
          mkdir -p server/internal/livekit/bin
          LK_FILENAME="livekit_${LIVEKIT_VERSION}_linux_${LK_ARCH}.tar.gz"
          curl -fsSL "https://github.com/livekit/livekit/releases/download/v${LIVEKIT_VERSION}/${LK_FILENAME}" -o "/tmp/${LK_FILENAME}"
          tar -xzf "/tmp/${LK_FILENAME}" -C server/internal/livekit/bin/ livekit-server
          chmod +x server/internal/livekit/bin/livekit-server

      - name: Build server binary
        working-directory: server
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -ldflags="-s -w" -o ../dist/bedrud ./cmd/bedrud/main.go

      - name: Package binary
        run: |
          cd dist
          cp bedrud bedrud_${{ matrix.suffix }}
          tar -cJf bedrud_${{ matrix.suffix }}.tar.xz bedrud
          rm bedrud

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: |
            dist/bedrud_${{ matrix.suffix }}.tar.xz
            dist/bedrud_${{ matrix.suffix }}

  # ── Docker image ──────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Android APK ──────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PROPERTIES: ${{ secrets.ANDROID_KEYSTORE_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            echo "$KEYSTORE_PROPERTIES" > keystore.properties
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APKs
        run: ./gradlew assembleDebug

      - name: Build release APKs
        run: |
          if [ -f keystore.properties ]; then
            ./gradlew assembleRelease
          else
            echo "⚠ Skipping release build — no signing key configured"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-universal
          path: apps/android/app/build/outputs/apk/debug/app-universal-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-arm64-v8a
          path: apps/android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-armeabi-v7a
          path: apps/android/app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-x86_64
          path: apps/android/app/build/outputs/apk/debug/app-x86_64-debug.apk

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/android/keystore.properties') != '' }}
        with:
          name: android-release-universal
          path: apps/android/app/build/outputs/apk/release/app-universal-release.apk

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/android/keystore.properties') != '' }}
        with:
          name: android-release-arm64-v8a
          path: apps/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/android/keystore.properties') != '' }}
        with:
          name: android-release-armeabi-v7a
          path: apps/android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/android/keystore.properties') != '' }}
        with:
          name: android-release-x86_64
          path: apps/android/app/build/outputs/apk/release/app-x86_64-release.apk

  # ── iOS IPA ──────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-15
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v4

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "⚠ No iOS signing certificate configured"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          if [ -n "$PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          fi

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: apps/ios/.spm-cache
          key: ios-spm-${{ hashFiles('apps/ios/Bedrud.xcodeproj/project.pbxproj') }}
          restore-keys: ios-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Run tests
        run: |
          xcodebuild test \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -configuration Release \
            -archivePath build/Bedrud.xcarchive \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

      - name: Export IPA
        env:
          HAS_CERT: ${{ secrets.IOS_P12_BASE64 != '' }}
        run: |
          if [ "$HAS_CERT" = "true" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Bedrud.xcarchive \
              -exportPath build/export \
              -exportOptionsPlist ExportOptions.plist \
              -allowProvisioningUpdates
          else
            echo "⚠ Skipping IPA export — no signing certificate configured"
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('apps/ios/build/export/Bedrud.ipa') != '' }}
        with:
          name: ios-ipa
          path: apps/ios/build/export/Bedrud.ipa

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # ── Desktop (multi-platform) ──────────────────────────────────
  desktop:
    name: Desktop – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            deb_arch: amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            deb_arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            nsis_arch: x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            name: windows-arm64
            nsis_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Slint dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libsecret-1-dev \
            libasound2-dev

      - name: Install NSIS (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build release binary
        run: cargo build -p bedrud-desktop --release --target ${{ matrix.target }}

      # ── Linux packaging ─────────────────────────────────────
      - name: Package Linux (portable tar.xz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bedrud-desktop dist/
          tar -cJf bedrud-desktop-${{ matrix.name }}.tar.xz -C dist .

      - name: Package Linux (.deb)
        if: runner.os == 'Linux'
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications

          cp target/${{ matrix.target }}/release/bedrud-desktop deb/usr/bin/

          cat > deb/DEBIAN/control <<EOF
          Package: bedrud-desktop
          Version: ${{ github.ref_name }}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: Bedrud <info@bedrud.ir>
          Description: Bedrud Desktop — self-hosted video meeting client
           Native desktop client for the Bedrud video meeting platform.
          Depends: libc6, libgcc1
          EOF

          cat > deb/usr/share/applications/bedrud.desktop <<EOF
          [Desktop Entry]
          Name=Bedrud
          Exec=/usr/bin/bedrud-desktop
          Type=Application
          Categories=Network;VideoConference;
          Comment=Self-hosted video meetings
          EOF

          dpkg-deb --build deb bedrud-desktop-${{ matrix.name }}.deb

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: bedrud-desktop-${{ matrix.name }}-portable
          path: bedrud-desktop-${{ matrix.name }}.tar.xz

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: bedrud-desktop-${{ matrix.name }}-deb
          path: bedrud-desktop-${{ matrix.name }}.deb

      # ── Windows packaging ────────────────────────────────────
      - name: Package Windows (portable zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\bedrud-desktop.exe" dist\
          Compress-Archive -Path dist\* -DestinationPath "bedrud-desktop-${{ matrix.name }}.zip"

      - name: Package Windows (NSIS installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\bedrud-desktop.exe" apps\desktop\installer\windows\
          cd apps\desktop\installer\windows
          makensis /DARCH=${{ matrix.nsis_arch }} bedrud.nsi
          Move-Item "bedrud-desktop-setup-${{ matrix.nsis_arch }}.exe" "${{ github.workspace }}\bedrud-desktop-${{ matrix.name }}-setup.exe"

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: bedrud-desktop-${{ matrix.name }}-portable
          path: bedrud-desktop-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: bedrud-desktop-${{ matrix.name }}-setup
          path: bedrud-desktop-${{ matrix.name }}-setup.exe

  # ── GitHub Release ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [server-binary, docker, android, desktop]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{server-*,android-debug-*,android-release-*,ios-*,bedrud-desktop-*}"

      - name: Collect release assets
        run: |
          mkdir -p release-assets

          # Server binaries
          find artifacts/server-* -name "*.tar.xz" -exec cp {} release-assets/ \;

          # Android debug APKs
          for f in \
            "android-debug-universal/app-universal-debug.apk:bedrud-android-universal-debug.apk" \
            "android-debug-arm64-v8a/app-arm64-v8a-debug.apk:bedrud-android-arm64-v8a-debug.apk" \
            "android-debug-armeabi-v7a/app-armeabi-v7a-debug.apk:bedrud-android-armeabi-v7a-debug.apk" \
            "android-debug-x86_64/app-x86_64-debug.apk:bedrud-android-x86_64-debug.apk"; do
            src="${f%%:*}" dst="${f##*:}"
            [ -f "artifacts/${src}" ] && cp "artifacts/${src}" "release-assets/${dst}" || true
          done

          # Android release APKs (signed)
          for f in \
            "android-release-universal/app-universal-release.apk:bedrud-android-universal-release.apk" \
            "android-release-arm64-v8a/app-arm64-v8a-release.apk:bedrud-android-arm64-v8a-release.apk" \
            "android-release-armeabi-v7a/app-armeabi-v7a-release.apk:bedrud-android-armeabi-v7a-release.apk" \
            "android-release-x86_64/app-x86_64-release.apk:bedrud-android-x86_64-release.apk"; do
            src="${f%%:*}" dst="${f##*:}"
            [ -f "artifacts/${src}" ] && cp "artifacts/${src}" "release-assets/${dst}" || true
          done

          # iOS IPA (optional — may not exist without signing certs)
          [ -f artifacts/ios-ipa/Bedrud.ipa ] && cp artifacts/ios-ipa/Bedrud.ipa release-assets/Bedrud.ipa || true

          # Desktop: portable + installers + deb packages
          find artifacts/bedrud-desktop-* -type f -exec cp {} release-assets/ \;

          ls -la release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  # ── Telegram notification ─────────────────────────────────────
  telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.result == 'success'
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          MSG=$(cat <<EOF
          🚀 <b>Bedrud ${TAG} released!</b>

          <a href="${RELEASE_URL}">📦 View full release on GitHub</a>

          <b>🖥 Server binaries</b>
          • <a href="${BASE}/bedrud_linux_amd64.tar.xz">Linux x86_64</a>
          • <a href="${BASE}/bedrud_linux_arm64.tar.xz">Linux ARM64</a>

          <b>🤖 Android (release)</b>
          • <a href="${BASE}/bedrud-android-universal-release.apk">Universal APK</a>
          • <a href="${BASE}/bedrud-android-arm64-v8a-release.apk">arm64-v8a</a>
          • <a href="${BASE}/bedrud-android-armeabi-v7a-release.apk">armeabi-v7a</a>
          • <a href="${BASE}/bedrud-android-x86_64-release.apk">x86_64</a>

          <b>🤖 Android (debug)</b>
          • <a href="${BASE}/bedrud-android-universal-debug.apk">Universal APK</a>
          • <a href="${BASE}/bedrud-android-arm64-v8a-debug.apk">arm64-v8a</a>
          • <a href="${BASE}/bedrud-android-armeabi-v7a-debug.apk">armeabi-v7a</a>
          • <a href="${BASE}/bedrud-android-x86_64-debug.apk">x86_64</a>

          <b>🪟 Desktop Windows (installer)</b>
          • <a href="${BASE}/bedrud-desktop-windows-x86_64-setup.exe">x86_64 Setup</a>
          • <a href="${BASE}/bedrud-desktop-windows-arm64-setup.exe">ARM64 Setup</a>

          <b>🪟 Desktop Windows (portable)</b>
          • <a href="${BASE}/bedrud-desktop-windows-x86_64.zip">x86_64 zip</a>
          • <a href="${BASE}/bedrud-desktop-windows-arm64.zip">ARM64 zip</a>

          <b>🐧 Desktop Linux (portable)</b>
          • <a href="${BASE}/bedrud-desktop-linux-x86_64.tar.xz">x86_64 tar.xz</a>
          • <a href="${BASE}/bedrud-desktop-linux-arm64.tar.xz">ARM64 tar.xz</a>

          <b>🐧 Desktop Linux (.deb)</b>
          • <a href="${BASE}/bedrud-desktop-linux-x86_64.deb">x86_64 .deb</a>
          • <a href="${BASE}/bedrud-desktop-linux-arm64.deb">ARM64 .deb</a>

          <b>🐳 Docker</b>
          <code>docker pull ghcr.io/${REPO}:${TAG}</code>
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MSG}"
